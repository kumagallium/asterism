# Phase 0.5 togopackage spike — multi-source variant
#
# 2 個の source を登録。togopackage は live reload を持たないため、
# config.yaml の更新 -> container restart -> QLever index 再ビルド の流れになる。

sparql_backend: qlever
mcp_server: togomcp

source:
  - name: starrydata-papers-subset-a
    path: ./sources/papers_100.ttl
    format: ttl
    graph: http://localhost/asterism/starrydata/graph/subset-a
  - name: starrydata-papers-subset-b
    path: ./sources/papers_100_b.ttl
    format: ttl
    graph: http://localhost/asterism/starrydata/graph/subset-b
