# Curated starter pack of KNOWN EXTERNAL VOCABULARIES — the single source of truth
# (SoT) for both RECOGNITION (the map / reuse display) and GROUNDING (proposing a real
# external term for a class/predicate, then a human confirms — external-standard-
# alignment.md §8).
#
# INVARIANT — every term IRI here is REAL, never fabricated. Each was extracted /
# verified against the AUTHORITATIVE ontology RDF cited in the vocabulary's `source`
# (retrieved on `retrieved`). The grounding search only ever returns IRIs from this
# closed set, so the LLM/UI never invents an IRI (the human still vets the choice).
#
# CURATION, not mirroring. This grows by hand — the famous / foundational vocabularies
# per ACTIVE domain (like QUDT units or the Tier-0 function library), NOT by importing
# all of LOV (~700) / BioPortal. To add a term: confirm its localname exists in the
# vocabulary's `source` RDF, then append `{ name, kind, label }` (kind = class | property).
#
# `iri` of a term = `namespace` + `name`. Keep names verbatim from the source.

vocabularies:
  # ── Materials science & engineering ──────────────────────────────────────────
  - prefix: cmso
    title: Computational Material Sample Ontology (CMSO)
    # NOTE: the AUTHORITATIVE term IRIs in the published CMSO RDF use http:// (the
    # ontology IRI is http://purls.helmholtz-metadaten.de/cmso/). The https:// PURL
    # only 303-redirects to the HTML docs; it is NOT the term identity. Reuse must
    # match the http:// strings the ontology actually mints, so that is the namespace.
    namespace: http://purls.helmholtz-metadaten.de/cmso/
    domain: materials
    homepage: https://ocdo.github.io/cmso/
    source: https://raw.githubusercontent.com/OCDO/cmso-ontology/main/cmso.owl
    retrieved: 2026-06-15
    version: 0.0.1
    terms:
      - { name: CrystalStructure, kind: class, label: Crystal Structure }
      - { name: Structure, kind: class, label: Structure }
      - { name: SpaceGroup, kind: class, label: Space Group }
      - { name: UnitCell, kind: class, label: Unit Cell }
      - { name: SimulationCell, kind: class, label: Simulation Cell }
      - { name: Material, kind: class, label: Material }
      - { name: ComputationalSample, kind: class, label: Computational Sample }
      - { name: AtomicScaleSample, kind: class, label: Atomic Scale Sample }
      - { name: MacroscaleSample, kind: class, label: Macroscale Sample }
      - { name: ChemicalComposition, kind: class, label: Chemical Composition }
      - { name: ChemicalElement, kind: class, label: Chemical Element }
      - { name: ChemicalSpecies, kind: class, label: Chemical Species }
      - { name: Atom, kind: class, label: Atom }
      - { name: Molecule, kind: class, label: Molecule }
      - { name: Microstructure, kind: class, label: Microstructure }
      - { name: CrystalDefect, kind: class, label: Crystal Defect }
      - { name: LatticeParameter, kind: class, label: Lattice Parameter }
      - { name: Polycrystal, kind: class, label: Polycrystal }
      - { name: AmorphousMaterial, kind: class, label: Amorphous Material }
      - { name: hasStructure, kind: property, label: has structure }
      - { name: hasSpaceGroup, kind: property, label: has space group }
      - { name: hasUnitCell, kind: property, label: has unit cell }
      - { name: hasSimulationCell, kind: property, label: has simulation cell }
      - { name: hasMaterial, kind: property, label: has material }
      - { name: hasElement, kind: property, label: has element }
      - { name: hasSpecies, kind: property, label: has species }
      - { name: hasLatticeParameter, kind: property, label: has lattice parameter }
      - { name: hasSpaceGroupNumber, kind: property, label: has space group number }
