      - { name: hasChemicalSymbol, kind: property, label: has chemical symbol }
      - { name: hasElementRatio, kind: property, label: has element ratio }
      - { name: hasNumberOfAtoms, kind: property, label: has number of atoms }
      - { name: hasBravaisLattice, kind: property, label: has Bravais lattice }
      - { name: hasVolume, kind: property, label: has volume }

