  # EMMO is RECOGNIZED for the map, but not yet GROUNDABLE: the canonical EMMO mints
  # opaque IRIs (https://w3id.org/emmo#EMMO_<uuid>), so name/label search needs a
  # different (annotation-indexed) strategy. Curated terms are deferred — known limit.
  - prefix: emmo
    title: Elementary Multiperspective Material Ontology (EMMO)
    namespace: https://w3id.org/emmo#
    domain: materials
    homepage: https://emmo-repo.github.io/
    terms: []

