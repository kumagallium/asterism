# Demo overlay — adds the ARiSE grounded-answer demo (demo-agent + a one-shot
# seed loader) ON TOP OF compose.yaml without editing it, so the UI session can
# keep owning the base file (no merge conflict; this tree has no git).
#
# Usage:
#   python scripts/make_demo_subset.py            # once: writes datasets/starrydata/seed/*.ttl
#   docker compose -f compose.yaml -f compose.demo.yaml up -d --build
#   # ask a grounded question:
#   curl -s localhost:8090/demo/ask -H 'content-type: application/json' \
#     -d '{"question":"ZTが最も高い熱電材料は？"}' | jq
#
# See demo-agent/DEMO.md for the full runbook.

services:
  # One-shot: wait for Oxigraph, bulk-load the demo seed Turtle, then exit.
  oxigraph-seed:
    image: python:3.11-slim
    container_name: asterism_demo_seed
    depends_on:
      - oxigraph
    volumes:
      - ./datasets/starrydata/seed:/seed:ro
    command: ["python", "/seed/load.py", "http://oxigraph:7878", "/seed"]
    restart: "no"

  # The grounded-answer service (consuming layer; separate from asterism core so
  # the core query path stays Claude-free — ADR §1/§5). Deterministic answers.
  demo-agent:
    build:
      context: .
      dockerfile: demo-agent/Dockerfile
    container_name: asterism_demo_agent
    depends_on:
      - oxigraph
    environment:
      CSV2RDF_OXIGRAPH_URL: http://oxigraph:7878
      # Report Ask token usage to the api's ledger (best-effort; omit to disable).
      # ASTERISM_API_TOKEN must match the api's write token when that route is gated.
      ASTERISM_API_URL: http://upload-api:8080
      ASTERISM_API_TOKEN: ${ASTERISM_API_TOKEN:-}
    ports:
      # Loopback-only: the demo-agent answers from the live store and (when the
      # raw escape is enabled) proxies SPARQL. Do not expose it on the LAN over a
      # store holding unpublished data; it also uses wildcard CORS in dev.
      - "127.0.0.1:8090:8090"
    restart: unless-stopped
